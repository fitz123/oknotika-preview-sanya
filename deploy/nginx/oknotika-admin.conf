upstream oknotika_admin_unix {
    server unix:/run/oknotika-admin/app.sock;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name admin.oknotika.ru;
    return 308 https://admin.oknotika.ru$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name admin.oknotika.ru;

    ssl_certificate /etc/letsencrypt/live/admin.oknotika.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.oknotika.ru/privkey.pem;
    client_max_body_size 1m;
    limit_req_status 429;

    include /etc/nginx/snippets/oknotika-admin-security-headers.conf;

    location = /auth/start {
        limit_req zone=oknotika_admin_login burst=3 nodelay;
        proxy_pass http://oknotika_admin_unix;
        include /etc/nginx/proxy_params;
        proxy_set_header Host admin.oknotika.ru;
        proxy_set_header X-Forwarded-Host admin.oknotika.ru;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
    }

    location = /auth/callback {
        limit_req zone=oknotika_admin_login burst=3 nodelay;
        proxy_pass http://oknotika_admin_unix;
        include /etc/nginx/proxy_params;
        proxy_set_header Host admin.oknotika.ru;
        proxy_set_header X-Forwarded-Host admin.oknotika.ru;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
    }

    location = /api/uploads {
        client_max_body_size 10m;
        limit_conn oknotika_admin_uploads 2;
        limit_req zone=oknotika_admin_general burst=5 nodelay;
        proxy_pass http://oknotika_admin_unix;
        include /etc/nginx/proxy_params;
        proxy_set_header Host admin.oknotika.ru;
        proxy_set_header X-Forwarded-Host admin.oknotika.ru;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
        proxy_request_buffering on;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location / {
        limit_req zone=oknotika_admin_general burst=30 nodelay;
        proxy_pass http://oknotika_admin_unix;
        include /etc/nginx/proxy_params;
        proxy_set_header Host admin.oknotika.ru;
        proxy_set_header X-Forwarded-Host admin.oknotika.ru;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
        proxy_request_buffering on;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}
