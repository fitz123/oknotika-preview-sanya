server {
    listen 80;
    listen [::]:80;
    server_name oknotika.ru www.oknotika.ru;
    return 308 https://oknotika.ru$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.oknotika.ru;

    ssl_certificate /etc/letsencrypt/live/oknotika.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oknotika.ru/privkey.pem;
    return 308 https://oknotika.ru$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name oknotika.ru;

    ssl_certificate /etc/letsencrypt/live/oknotika.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oknotika.ru/privkey.pem;
    root /srv/oknotika/current;
    index index.html;
    etag on;

    include /etc/nginx/snippets/oknotika-public-security-headers.conf;

    location = /articles {
        return 308 /articles/;
    }

    location ~ ^/articles/assets/(?<article_asset>[0-9a-f]{24}\.(?:jpg|png|webp))$ {
        alias /var/lib/oknotika-admin/article-releases/active/articles/assets/$article_asset;
        include /etc/nginx/snippets/oknotika-public-security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /articles/ {
        alias /var/lib/oknotika-admin/article-releases/active/articles/;
        index index.html;
        include /etc/nginx/snippets/oknotika-public-security-headers.conf;
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
    }

    location / {
        try_files $uri $uri/ =404;
        include /etc/nginx/snippets/oknotika-public-security-headers.conf;
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
    }
}
