<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{title}} — ОКНОТИКА</title>
  <meta name="description" content="{{description}}" />
  <meta name="theme-color" content="#0b0f12" />
  <meta name="robots" content="{{robots}}" />
  <link rel="canonical" href="{{canonical}}" />
  <meta property="og:type" content="article" />
  <meta property="og:title" content="{{title}}" />
  <meta property="og:description" content="{{description}}" />
  <meta property="og:url" content="{{canonical}}" />
  <meta property="og:image" content="{{ogImage}}" />
  <meta property="article:published_time" content="{{publicationAt}}" />
  <link rel="stylesheet" href="../../style.css" />
</head>
<body>
  <header class="site-header" data-header>
    <a class="brand" href="../../#top" aria-label="ОКНОТИКА"><img class="brand__logo" src="../../img/logo-oknotika.svg" alt="Логотип ОКНОТИКА" /><span class="brand__text">ОКНОТИКА</span></a>
    <nav class="nav"><a href="../../">Главная</a><a href="../../aluminum/">Алюминий</a><a href="../">Факт недели</a><a href="../../#contacts">Контакты</a></nav>
    <a class="header-cta" href="https://t.me/ambassadorokon" target="_blank" rel="noreferrer">Обсудить проект</a>
  </header>
  <main id="top">
    <section class="section page-hero">
      <div class="page-hero__bg" aria-hidden="true"><img src="{{coverPath}}" alt="" /></div>
      <div class="container page-hero__inner reveal">
        <p class="eyebrow">Факт недели · {{displayDate}}</p>
        <h1>{{title}}</h1>
        <p class="hero__lead">{{lead}}</p>
      </div>
    </section>
    <section class="section">
      <article class="container article-body reveal">
{{body}}
{{source}}
      </article>
    </section>
  </main>
  <footer class="footer"><div class="container footer__inner"><p>© 2026 ООО «ОКНОТИКА» · факт недели</p><p><a href="../">К списку статей</a> · <a href="#top">Наверх</a></p></div></footer>
  <script src="../../script.js"></script>
</body>
</html>
