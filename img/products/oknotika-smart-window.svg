<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Умное окно OKNOTIKA</title>
  <desc id="desc">Схема умного окна с поворотной и откидной створкой, автоматикой и управлением</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f12"/>
      <stop offset="0.56" stop-color="#142228"/>
      <stop offset="1" stop-color="#2a312d"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dffcff" stop-opacity="0.76"/>
      <stop offset="0.44" stop-color="#80dce6" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#101820" stop-opacity="0.72"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1200" height="640" fill="url(#bg)"/>
  <g opacity="0.15" stroke="#f4efe6" stroke-width="1">
    <path d="M0 100h1200M0 220h1200M0 340h1200M0 460h1200M0 580h1200"/>
    <path d="M120 0v640M300 0v640M480 0v640M660 0v640M840 0v640M1020 0v640"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="150" y="78" width="650" height="452" rx="18" fill="#070b0e" stroke="#c5a15f" stroke-width="6"/>
    <rect x="190" y="118" width="270" height="372" rx="6" fill="url(#glass)" stroke="#f4efe6" stroke-opacity="0.35" stroke-width="2"/>
    <rect x="500" y="118" width="260" height="372" rx="6" fill="url(#glass)" stroke="#f4efe6" stroke-opacity="0.35" stroke-width="2"/>
    <path d="M480 118v372" stroke="#c5a15f" stroke-width="9"/>
    <circle cx="482" cy="304" r="7" fill="#c5a15f"/>

    <!-- turn sash: triangle points to the center mullion -->
    <path d="M205 132 L460 304 L205 476" fill="none" stroke="#f4efe6" stroke-opacity="0.75" stroke-width="5" stroke-linejoin="round"/>
    <text x="210" y="104" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#f4efe6" opacity="0.78">поворот</text>

    <!-- tilt sash: triangle rises upward from bottom rail -->
    <path d="M515 476 L630 132 L745 476" fill="none" stroke="#74d7df" stroke-opacity="0.86" stroke-width="5" stroke-linejoin="round"/>
    <text x="512" y="104" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#74d7df" opacity="0.9">откидное проветривание</text>
  </g>

  <g transform="translate(838 112)" filter="url(#shadow)">
    <rect width="220" height="344" rx="30" fill="#0c1115" stroke="#f4efe6" stroke-opacity="0.22"/>
    <rect x="22" y="54" width="176" height="218" rx="18" fill="#111b20" stroke="#74d7df" stroke-opacity="0.35"/>
    <circle cx="110" cy="305" r="17" fill="#1b282d" stroke="#f4efe6" stroke-opacity="0.18"/>
    <text x="110" y="35" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#f4efe6" letter-spacing="2">OKNOTIKA</text>
    <text x="110" y="103" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="900" fill="#74d7df">42%</text>
    <text x="110" y="132" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#82909a">проветривание</text>
    <path d="M55 178h110M55 216h110" stroke="#f4efe6" stroke-opacity="0.22" stroke-width="6" stroke-linecap="round"/>
    <path d="M55 178h76M55 216h42" stroke="#c5a15f" stroke-width="6" stroke-linecap="round"/>
  </g>

  <g fill="none" stroke="#74d7df" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 12" opacity="0.78">
    <path d="M800 210c34 0 45 0 72 0"/>
    <path d="M800 326c38 0 50 0 72 0"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" font-weight="800">
    <text x="150" y="584" fill="#f4efe6" font-size="42" letter-spacing="-1.5">Умное окно</text>
    <text x="492" y="584" fill="#c5a15f" font-size="42" letter-spacing="-1.5">OKNOTIKA</text>
  </g>
</svg>
